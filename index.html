<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Centralizada</title>
    <style>
        /* Reseta margens e garante que a página ocupe toda a tela */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente */
            min-height: 100vh;       /* Ocupa 100% da altura da janela do navegador */
            background-color: #f9f9f9; /* Fundo cinza bem claro (opcional) */
            overflow: hidden;        /* Evita barras de rolagem indesejadas */
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            /* Faz com que a imagem ocupe exatamente 40% da altura da tela (vh) */
            height: 40vh; 
            width: auto; /* Mantém a proporção da largura automaticamente */
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="473623.png" alt="Personagem apontando para cima">
    </div>

</body>
</html>
