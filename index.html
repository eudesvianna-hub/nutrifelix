<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site em Construção</title>
    <style>
        /* Reseta margens e garante que a página ocupe toda a tela */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente */
            min-height: 100vh;       /* Ocupa 100% da altura da janela do navegador */
            background-color: #f0f8ff; /* Um fundo azul bem clarinho e suave */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Fonte moderna */
            overflow: hidden;        /* Evita barras de rolagem indesejadas */
        }


        .main-container {
            position: relative;
            display: flex;
            flex-direction: column; /* Organiza os elementos em coluna */
            align-items: center;    /* Centraliza os elementos internamente */
            padding: 20px;
        }


        /* Container da Imagem */
        .image-container {
            position: relative;
            display: inline-block;
        }


        img {
            /* Faz com que a imagem ocupe 50% da altura da tela (vh) */
            height: 50vh; 
            width: auto; /* Mantém a proporção da largura automaticamente */
            object-fit: contain;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1)); /* Sombra suave na imagem */
        }


        /* Estilização do Texto (Balão de Fala) */
        .text-bubble {
            position: absolute;
            background-color: #fff; /* Fundo branco do balão */
            padding: 15px 20px;
            border-radius: 20px; /* Bordas bem arredondadas */
            box-shadow: 0px 8px 15px rgba(0,0,0,0.15); /* Sombra mais pronunciada no balão */
            max-width: 300px;
            text-align: center;
            font-size: 1.1rem;
            color: #333;
            line-height: 1.4;
            font-weight: 500;
            
            /* Posicionamento acima da imagem */
            bottom: 100%; /* Começa exatamente onde a imagem termina */
            left: 50%;
            transform: translateX(-50%); /* Centraliza horizontalmente em relação à imagem */
            margin-bottom: 20px; /* Espaço extra acima do dedo */
        }


        /* Seta (triângulo) do balão de fala */
        .text-bubble::after {
            content: '';
            position: absolute;
            top: 100%; /* Seta sai da parte inferior do balão */
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px;
            border-style: solid;
            border-color: #fff transparent transparent transparent; /* Triângulo branco apontando para baixo */
        }


        /* Responsividade para telas menores (celulares) */
        @media (max-width: 600px) {
            img {
                height: 40vh; /* Imagem menor em celulares */
            }
            .text-bubble {
                font-size: 1rem;
                padding: 10px 15px;
                max-width: 250px;
                bottom: 100%;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>


    <div class="main-container">
        <div class="text-bubble">
            <p>O meu site está em construção e vai ficar maravilhoso. Aguarde.</p>
        </div>


        <div class="image-container">
            <img src="473623.png" alt="Doutora apontando para o céu">
        </div>
    </div>


</body>
</html>
